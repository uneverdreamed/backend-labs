<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лаба 13 — Управление студентами</title>

    <!-- подключение CSS-файлов: сначала базовые стили, потом стили компонентов -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
    <header>
        <h1>Управление студентами</h1>
        <!-- навигация по вкладкам — data-section указывает id секции -->
        <nav>
            <button class="active" data-section="students">Студенты</button>
            <button data-section="courses">Курсы</button>
            <button data-section="enrollments">Записи</button>
        </nav>
    </header>

    <main>
        <!-- ===== ВКЛАДКА: СТУДЕНТЫ ===== -->
        <div id="students" class="section active">
            <h2>Студенты</h2>

            <div id="student-msg" class="message"></div>

            <!-- форма добавления студента -->
            <div class="form-card">
                <h3>Добавить студента</h3>
                <form id="student-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="student-name">Имя</label>
                            <input type="text" id="student-name" placeholder="Иванов Иван" required>
                        </div>
                        <div class="form-group">
                            <label for="student-group">Группа</label>
                            <input type="text" id="student-group" placeholder="241-333" required>
                        </div>
                        <button type="submit" class="btn btn-success">Добавить</button>
                    </div>
                </form>
            </div>

            <!-- таблица студентов — заполняется через JS -->
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Имя</th>
                        <th>Группа</th>
                        <th>Дата создания</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="students-table">
                    <tr><td colspan="5" class="loading">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- ===== ВКЛАДКА: КУРСЫ ===== -->
        <div id="courses" class="section">
            <h2>Курсы</h2>

            <div id="course-msg" class="message"></div>

            <div class="form-card">
                <h3>Добавить курс</h3>
                <form id="course-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="course-name">Название</label>
                            <input type="text" id="course-name" placeholder="Математика" required>
                        </div>
                        <div class="form-group">
                            <label for="course-desc">Описание</label>
                            <input type="text" id="course-desc" placeholder="Лекция + Практика" required>
                        </div>
                        <div class="form-group">
                            <label for="course-credits">Кол-во работ</label>
                            <input type="number" id="course-credits" min="1" max="10" value="4" required>
                        </div>
                        <button type="submit" class="btn btn-success">Добавить</button>
                    </div>
                </form>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Название</th>
                        <th>Описание</th>
                        <th>Кол-во работ</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="courses-table">
                    <tr><td colspan="5" class="loading">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- ===== ВКЛАДКА: ЗАПИСИ НА КУРСЫ ===== -->
        <div id="enrollments" class="section">
            <h2>Записи на курсы</h2>

            <div id="enroll-msg" class="message"></div>

            <div class="form-card">
                <h3>Записать студента на курс</h3>
                <form id="enroll-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="enroll-student">Студент</label>
                            <!-- select заполняется динамически данными с сервера -->
                            <select id="enroll-student" required>
                                <option value="">Выберите студента</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="enroll-course">Курс</label>
                            <select id="enroll-course" required>
                                <option value="">Выберите курс</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success">Записать</button>
                    </div>
                </form>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Студент ID</th>
                        <th>Курс ID</th>
                        <th>Дата записи</th>
                        <th>Оценка</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="enrollments-table">
                    <tr><td colspan="6" class="loading">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- подключение JS-файлов: сначала модуль API, потом основной скрипт -->
    <!-- порядок важен: app.js использует функции из api.js -->
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
