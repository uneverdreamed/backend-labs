<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>sessionStorage</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>sessionStorage (клиент)</h1>
        <a href="index.html" class="back">← На главную</a>
    </header>

    <main>
        <section class="card">
            <h2>Сохранение в sessionStorage</h2>
            <p>Данные доступны только в пределах одной вкладки браузера. Закрытие вкладки удаляет данные, обновление страницы — сохраняет.</p>
            <div class="form">
                <input id="name" placeholder="Имя">
                <input id="group" placeholder="Группа">
                <button onclick="save()">Сохранить в sessionStorage</button>
                <button onclick="read()">Прочитать sessionStorage</button>
                <button onclick="clearData()">Удалить из sessionStorage</button>
            </div>
            <div id="result" class="result"></div>
        </section>
    </main>

    <script src="js/sessionstorage.js"></script>
</body>
